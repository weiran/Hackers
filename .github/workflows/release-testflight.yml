name: Release TestFlight

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to upload, for example v5.3.0+153"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-testflight-${{ github.event.inputs.release_tag || github.ref_name }}
  cancel-in-progress: false

env:
  CI_DEVICE_NAME: iPhone 17 Pro
  XCODE_VERSION_FILE: .github/xcode-version
  BUNDLE_WITHOUT: development
  BUNDLE_VERSION: system

jobs:
  testflight:
    name: testflight
    runs-on: macos-26
    timeout-minutes: 120
    environment: testflight
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.release_tag || github.ref }}

      - name: Prepare Xcode
        run: scripts/ci/setup-xcode-simulator.sh --xcode-only

      - name: Install Bundler dependencies
        run: |
          bundle config set path vendor/bundle
          bundle install

      - name: Resolve release notes
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.inputs.release_tag || github.ref_name }}
        run: |
          mkdir -p artifacts/release
          RELEASE_NOTES=artifacts/release/what-to-test.txt
          PREVIOUS_RELEASE_TAG=$(gh release list --json tagName,isDraft,publishedAt --limit 200 \
            | jq -r --arg TAG "$RELEASE_TAG" '[.[] | select(.isDraft == false and .tagName != $TAG)] | .[0].tagName')

          if [ "$PREVIOUS_RELEASE_TAG" = "null" ]; then
            PREVIOUS_RELEASE_TAG=""
          fi

          if [ -n "$PREVIOUS_RELEASE_TAG" ]; then
            gh api repos/${GITHUB_REPOSITORY}/releases/generate-notes \
              --field tag_name="$RELEASE_TAG" \
              --field previous_tag_name="$PREVIOUS_RELEASE_TAG" \
              -q .body > "$RELEASE_NOTES"
          else
            gh api repos/${GITHUB_REPOSITORY}/releases/generate-notes \
              --field tag_name="$RELEASE_TAG" \
              -q .body > "$RELEASE_NOTES"
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --title "${RELEASE_TAG#v}" --notes-file "$RELEASE_NOTES"
          else
            gh release create "$RELEASE_TAG" --target "$RELEASE_TAG" --title "${RELEASE_TAG#v}" --notes-file "$RELEASE_NOTES" --draft
          fi

          if [ ! -s artifacts/release/what-to-test.txt ]; then
            echo "GitHub Release body is required for TestFlight What to Test" >&2
            exit 1
          fi

      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          RELEASE_TAG: ${{ github.event.inputs.release_tag || github.ref_name }}
          WHAT_TO_TEST_FILE: artifacts/release/what-to-test.txt
        run: bundle exec fastlane ios beta release_tag:"$RELEASE_TAG"

      - name: Release summary
        if: always()
        env:
          RELEASE_TAG: ${{ github.event.inputs.release_tag || github.ref_name }}
        run: |
          {
            echo "## TestFlight Release"
            echo
            echo "- Tag: ${RELEASE_TAG}"
            if [ -f artifacts/release/build-number.txt ]; then
              echo "- Uploaded build: $(cat artifacts/release/build-number.txt)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload release artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: testflight-artifacts
          path: |
            artifacts/release
            artifacts/logs
          if-no-files-found: ignore
          retention-days: 90

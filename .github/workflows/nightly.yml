name: Nightly

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: false

env:
  CI_DEVICE_NAME: iPhone 17 Pro
  XCODE_VERSION_FILE: .github/xcode-version

jobs:
  nightly-validation:
    name: nightly validation
    runs-on: macos-26
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Prepare Xcode and simulator
        run: scripts/ci/setup-xcode-simulator.sh

      - name: Run full UI tests
        run: |
          set -o pipefail
          mkdir -p artifacts/logs
          ./run_ui_tests.sh full 2>&1 | tee artifacts/logs/nightly-ui-tests.log

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nightly-diagnostics
          path: |
            artifacts/logs
            artifacts/xcresults
            **/*.xcresult
          if-no-files-found: ignore
          retention-days: 14

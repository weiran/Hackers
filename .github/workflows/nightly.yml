name: Nightly

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: false

env:
  CI_DEVICE_NAME: iPhone 17 Pro
  XCODE_VERSION_FILE: .github/xcode-version

jobs:
  clean-validation:
    name: clean validation
    runs-on: macos-26
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Prepare Xcode and simulator
        run: scripts/ci/setup-xcode-simulator.sh

      - name: Install SwiftLint
        run: |
          if ! command -v swiftlint >/dev/null 2>&1; then
            brew install swiftlint
          fi

      - name: SwiftLint
        run: swiftlint lint --config .swiftlint.yml --reporter github-actions-logging

      - name: Clean build
        run: |
          set -o pipefail
          mkdir -p artifacts/logs artifacts/xcresults
          xcodebuild clean build \
            -project Hackers.xcodeproj \
            -scheme Hackers \
            -destination "$CI_DESTINATION" \
            -resultBundlePath artifacts/xcresults/Hackers-Nightly-Build.xcresult \
            2>&1 | tee artifacts/logs/nightly-build.log

      - name: Run module tests
        run: |
          set -o pipefail
          ./run_tests.sh -v 2>&1 | tee artifacts/logs/nightly-tests.log

      - name: Run full UI tests
        run: |
          set -o pipefail
          ./run_ui_tests.sh full 2>&1 | tee artifacts/logs/nightly-ui-tests.log

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nightly-diagnostics
          path: |
            artifacts/logs
            artifacts/xcresults
            **/*.xcresult
          if-no-files-found: ignore
          retention-days: 14

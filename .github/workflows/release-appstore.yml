name: Release App Store

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Build-number release tag to submit, for example v5.3.1+154"
        required: true
        type: string
      build_number:
        description: "Optional processed App Store Connect build number to submit"
        required: false
        type: string
      app_store_release_notes:
        description: "Custom public App Store release notes. Do not paste GitHub/TestFlight notes."
        required: false
        type: string
      skip_app_version_update:
        description: "Skip creating/updating the App Store version"
        required: false
        type: boolean
        default: false
      cancel_pending_version:
        description: "Optional pending App Store version to cancel before submission"
        required: false
        type: string
      cancel_only:
        description: "Only cancel the pending App Store version; do not submit a build"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release-appstore-${{ github.event.inputs.release_tag }}
  cancel-in-progress: false

jobs:
  submit:
    name: submit app review
    runs-on: macos-26
    timeout-minutes: 30
    environment: testflight
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: master

      - name: Install Bundler dependencies
        run: |
          bundle config set path vendor/bundle
          bundle install

      - name: Resolve App Store release notes
        env:
          APP_STORE_RELEASE_NOTES: ${{ github.event.inputs.app_store_release_notes }}
          CANCEL_ONLY: ${{ github.event.inputs.cancel_only }}
        run: |
          mkdir -p artifacts/release
          RELEASE_NOTES=artifacts/release/app-store-release-notes.txt

          if [ "$CANCEL_ONLY" = "true" ]; then
            echo "Cancel-only run; App Store release notes are not required."
            exit 0
          fi

          printf '%s\n' "$APP_STORE_RELEASE_NOTES" > "$RELEASE_NOTES"

          if [ ! -s artifacts/release/app-store-release-notes.txt ]; then
            echo "Custom App Store release notes are required" >&2
            exit 1
          fi

          if grep -Eiq 'github\.com|Full Changelog|pull/[0-9]+|issues/[0-9]+|commit/[0-9a-f]+|^#|TestFlight|What to Test' "$RELEASE_NOTES"; then
            echo "App Store release notes must be custom public copy without GitHub, changelog, markdown heading, or TestFlight content" >&2
            exit 1
          fi

      - name: Cancel App Review
        if: ${{ github.event.inputs.cancel_only == 'true' }}
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
          CANCEL_PENDING_VERSION: ${{ github.event.inputs.cancel_pending_version }}
        run: bundle exec fastlane ios cancel_app_review version:"$CANCEL_PENDING_VERSION"

      - name: Submit for App Review
        if: ${{ github.event.inputs.cancel_only != 'true' }}
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
          RELEASE_TAG: ${{ github.event.inputs.release_tag }}
          BUILD_NUMBER: ${{ github.event.inputs.build_number }}
          SKIP_APP_VERSION_UPDATE: ${{ github.event.inputs.skip_app_version_update == 'true' && '1' || '0' }}
          CANCEL_PENDING_VERSION: ${{ github.event.inputs.cancel_pending_version }}
          WHAT_TO_TEST_FILE: artifacts/release/app-store-release-notes.txt
        run: bundle exec fastlane ios submit_app_review release_tag:"$RELEASE_TAG" build_number:"$BUILD_NUMBER"

      - name: App Store summary
        if: always()
        env:
          RELEASE_TAG: ${{ github.event.inputs.release_tag }}
          BUILD_NUMBER: ${{ github.event.inputs.build_number }}
        run: |
          {
            echo "## App Store Submission"
            echo
            echo "- Tag: ${RELEASE_TAG}"
            if [ -n "${BUILD_NUMBER}" ]; then
              echo "- Requested build: ${BUILD_NUMBER}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

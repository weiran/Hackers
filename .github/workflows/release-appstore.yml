name: Release App Store

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Build-number release tag to submit, for example v5.3.1+154"
        required: true
        type: string
      build_number:
        description: "Optional processed App Store Connect build number to submit"
        required: false
        type: string
      skip_app_version_update:
        description: "Skip creating/updating the App Store version"
        required: false
        type: boolean
        default: false
      cancel_pending_version:
        description: "Optional pending App Store version to cancel before submission"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-appstore-${{ github.event.inputs.release_tag }}
  cancel-in-progress: false

jobs:
  submit:
    name: submit app review
    runs-on: macos-26
    timeout-minutes: 30
    environment: testflight
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: master

      - name: Install Bundler dependencies
        run: |
          bundle config set path vendor/bundle
          bundle install

      - name: Resolve release notes
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.inputs.release_tag }}
        run: |
          mkdir -p artifacts/release
          RELEASE_NOTES=artifacts/release/app-store-release-notes.txt
          PREVIOUS_RELEASE_TAG=$(gh release list --json tagName,isDraft,publishedAt --limit 200 \
            | jq -r --arg TAG "$RELEASE_TAG" '[.[] | select(.isDraft == false and .tagName != $TAG)] | .[0].tagName')
          PREVIOUS_TAG=$(git tag --sort=-creatordate --list 'v*' \
            | awk -v TAG="$RELEASE_TAG" 'BEGIN { found=0 } \
              { if ($0 == TAG) { found=1; next } if (found) { print; exit } }')

          RELEASE_IS_DRAFT=$(gh release view "$RELEASE_TAG" --json isDraft -q .isDraft 2>/dev/null || echo true)

          if [ "$RELEASE_IS_DRAFT" = "true" ] && [ -n "$PREVIOUS_TAG" ]; then
            NOTE_START_TAG="$PREVIOUS_TAG"
          elif [ "$PREVIOUS_RELEASE_TAG" != "null" ] && [ -n "$PREVIOUS_RELEASE_TAG" ]; then
            NOTE_START_TAG="$PREVIOUS_RELEASE_TAG"
          else
            NOTE_START_TAG=""
          fi

          if [ -n "$NOTE_START_TAG" ]; then
            PAYLOAD=$(jq -nc --arg tag "$RELEASE_TAG" --arg prev "$NOTE_START_TAG" '{tag_name:$tag, previous_tag_name:$prev}')
            printf '%s' "$PAYLOAD" | gh api --method POST https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/generate-notes --input - --jq .body > "$RELEASE_NOTES"
          else
            PAYLOAD=$(jq -nc --arg tag "$RELEASE_TAG" '{tag_name:$tag}')
            printf '%s' "$PAYLOAD" | gh api --method POST https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/generate-notes --input - --jq .body > "$RELEASE_NOTES"
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --title "${RELEASE_TAG#v}" --notes-file "$RELEASE_NOTES"
          else
            gh release create "$RELEASE_TAG" --target "$RELEASE_TAG" --title "${RELEASE_TAG#v}" --notes-file "$RELEASE_NOTES"
          fi

          if [ ! -s artifacts/release/app-store-release-notes.txt ]; then
            echo "GitHub Release body is required for App Store release notes" >&2
            exit 1
          fi

      - name: Submit for App Review
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
          RELEASE_TAG: ${{ github.event.inputs.release_tag }}
          BUILD_NUMBER: ${{ github.event.inputs.build_number }}
          SKIP_APP_VERSION_UPDATE: ${{ github.event.inputs.skip_app_version_update == 'true' && '1' || '0' }}
          CANCEL_PENDING_VERSION: ${{ github.event.inputs.cancel_pending_version }}
          WHAT_TO_TEST_FILE: artifacts/release/app-store-release-notes.txt
        run: bundle exec fastlane ios submit_app_review release_tag:"$RELEASE_TAG" build_number:"$BUILD_NUMBER"

      - name: App Store summary
        if: always()
        env:
          RELEASE_TAG: ${{ github.event.inputs.release_tag }}
          BUILD_NUMBER: ${{ github.event.inputs.build_number }}
        run: |
          {
            echo "## App Store Submission"
            echo
            echo "- Tag: ${RELEASE_TAG}"
            if [ -n "${BUILD_NUMBER}" ]; then
              echo "- Requested build: ${BUILD_NUMBER}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
